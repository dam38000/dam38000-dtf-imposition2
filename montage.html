        const simplifyPath = (points, tolerance) => {
            if (points.length <= 2) return points;
            const getSqSegDist = (p, p1, p2) => {
                let x = p1[0], y = p1[1], dx = p2[0] - x, dy = p2[1] - y;
                if (dx !== 0 || dy !== 0) {
                    let t = ((p[0] - x) * dx + (p[1] - y) * dy) / (dx * dx + dy * dy);
                    if (t > 1) { x = p2[0]; y = p2[1]; } else if (t > 0) { x += dx * t; y += dy * t; }
                }
                return Math.pow(p[0] - x, 2) + Math.pow(p[1] - y, 2);
            };
            const step = (pts, first, last, sqTolerance, simplified) => {
                let maxSqDist = sqTolerance, index;
                for (let i = first + 1; i < last; i++) {
                    let sqDist = getSqSegDist(pts[i], pts[first], pts[last]);
                    if (sqDist > maxSqDist) { index = i; maxSqDist = sqDist; }
                }
                if (maxSqDist > sqTolerance) {
                    step(pts, first, index, sqTolerance, simplified);
                    step(pts, index, last, sqTolerance, simplified);
                } else { simplified.push(pts[last]); }
            };
            let simplified = [points[0]];
            step(points, 0, points.length - 1, tolerance * tolerance, simplified);
            return simplified;
        };

        const getSplineData = (points, tension = 0.5, isClosed = false) => {
            if (points.length < 2) return [];
            const pts = points.map(p => ({x: p[0], y: p[1]}));
            if (isClosed) {
                pts.push(pts[0]);
                pts.push(pts[1]);
                pts.unshift(pts[pts.length - 3]);
            } else {
                pts.unshift(pts[0]);
                pts.push(pts[pts.length - 1]);

                const p0 = pts[i-1];
                const p1 = pts[i];
                const p2 = pts[i+1];
                const p3 = pts[i+2];

            const prix = calcPrix();

            const FORMATS_PER_A2 = { 'A4': 4, 'A5': 8, 'A6': 16 };

            // Générer les PNGs de la session courante (taille originale, pour exports PDF)
            const generatePngs = async () => {
                const pW = parseInput(sheetSize.w), pH = parseInput(sheetSize.h);
                const DPI = 300;
                const MM_TO_PX = DPI / 25.4;
                const canvasW = Math.round(pW * MM_TO_PX);

                const pngPages = [];
                for (let i = 0; i < sheets.length; i++) {

                    for (const item of sheets[i].items) {
                        const img = new Image();
                        await new Promise(res => { img.onload = res; img.src = item.src; });
                        const x = Math.round(item.x * MM_TO_PX);
                        const y = Math.round(item.y * MM_TO_PX);

            // Générer les PNGs de fabrication : réimpose A4/A5/A6 sur des planches A2

                const smallW_mm = parseInput(sheetSize.w), smallH_mm = parseInput(sheetSize.h);

                const smallH_px = Math.round(smallH_mm * MM_TO_PX);

                // Calcul de la grille massicotable — tester les 2 orientations, garder la meilleure
                const cols1 = Math.floor(a2W_mm / smallW_mm);
                const rows1 = Math.floor(a2H_mm / smallH_mm);
                const cols2 = Math.floor(a2W_mm / smallH_mm);
                const rows2 = Math.floor(a2H_mm / smallW_mm);
                let cols, rows, tileW_px, tileH_px;
                if (cols1 * rows1 >= cols2 * rows2) {
                    cols = cols1; rows = rows1; tileW_px = smallW_px; tileH_px = smallH_px;
                } else {
                    cols = cols2; rows = rows2; tileW_px = smallH_px; tileH_px = smallW_px;
                }

                // Charger les images originales
                const origImages = [];
                for (const pngData of originalPngs) {
                    const img = new Image();
                    await new Promise(res => { img.onload = res; img.src = pngData; });
                    origImages.push(img);
                }

                const totalPlanches = prix.nb;
                const planchesParA2 = cols * rows;

                            const y = r * tileH_px;
                            ctx.drawImage(srcImg, x, y, tileW_px, tileH_px);
                            placed++;
                        }

                                )}
                                {getCurrentFormat() && <span className="mt-0.5 text-[10px] font-bold text-green-700 bg-green-100 px-2 py-0.5 rounded-full">{getCurrentFormat()}</span>}
                                <div className="flex flex-col gap-1.5 mt-2 w-full">
                                    <div className="flex gap-1">
                                        <button onClick={() => handleExportPDF('dessin')} disabled={sheets.length === 0} className={`flex-1 py-1.5 rounded flex items-center justify-center gap-1 font-bold text-[9px] transition-all ${sheets.length > 0 ? 'bg-blue-600 text-white hover:bg-blue-700' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}><Icons.Layout size={10}/> Dessin</button>
                                        <button onClick={() => handleExportCut()} disabled={sheets.length === 0} className={`flex-1 py-1.5 rounded flex items-center justify-center gap-1 font-bold text-[9px] transition-all ${sheets.length > 0 ? 'bg-red-600 text-white hover:bg-red-700' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}><Icons.Scissors size={10}/> Coupe</button>
                                    </div>
                                    <button onClick={() => handleExportComposite()} disabled={sheets.length === 0} className={`w-full py-1.5 rounded flex items-center justify-center gap-1 font-bold text-[9px] transition-all ${sheets.length > 0 ? 'bg-gray-700 text-white hover:bg-gray-800' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}><Icons.Layers size={10}/> Composite</button>
                                </div>
                            </div>

                            {/* ── COLONNE 2 : Panneau Prix ── */}
                            <div className="w-[310px] flex-shrink-0 border-r border-gray-200 bg-white p-3 flex flex-col justify-between overflow-hidden">
                                <div className="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1.5">💶 Devis</div>
                                {!prix ? (
                                    <div className="flex-1 flex items-center justify-center text-[10px] text-gray-400 italic text-center px-2">
                                        {stats.totalSheets === 0 ? 'Lancez le montage pour calculer le prix' : 'Format non reconnu — sélectionnez un preset (1M, A2…A6)'}
                                    </div>
                                ) : (
                                    <div className="flex flex-col gap-0.5 text-[10px] flex-1">
                                        <div className="flex justify-between text-gray-600">
                                            <span>{prix.nb} exemplaires {prix.format} × {formatEur(prix.pu)}</span>
                                            <span className="font-semibold">{formatEur(prix.totalCatalogue)}</span>
                                        </div>
                                        {prix.clientRemise > 0 && (
                                            <div className="flex justify-between text-green-700">
                                                <span>Remise client ({prix.clientRemise}%)</span>
                                                <span>- {formatEur(prix.remiseClientMontant)}</span>
                                            </div>
                                        )}
                                        {prix.promoData && (
                                            <div className="flex justify-between text-purple-700">
                                                <span>Code {codePromo} ({prix.promoData.type==='pct' ? prix.promoData.valeur+'%' : formatEur(prix.promoData.valeur)})</span>
                                                <span>- {formatEur(prix.remisePromoMontant)}</span>
                                            </div>
                                        )}
                                        <div className="flex justify-between font-bold text-[13px] text-blue-700 border-t border-gray-100 pt-1 mt-0.5">
                                            <span>Total HT</span><span>{formatEur(prix.totalHT)}</span>
                                        </div>
                                    </div>
                                )}
                                {/* Code promo */}
                                <div className="mt-1.5 flex gap-1">
                                    <input
                                        type="text" placeholder="Code promo"
                                        value={codePromoInput} onChange={e => setCodePromoInput(e.target.value)}
                                        onKeyDown={e => e.key==='Enter' && handleVerifyPromo()}
                                        className="flex-1 border border-gray-300 rounded px-2 text-[10px] h-6 focus:outline-none focus:border-purple-400"
                                    />
                                    <button onClick={handleVerifyPromo} className="px-2 h-6 bg-purple-600 hover:bg-purple-700 text-white rounded text-[9px] font-bold transition-colors">OK</button>
                                    {promoData && <button onClick={() => {setPromoData(null);setCodePromo('');setCodePromoInput('');}} className="px-1.5 h-6 bg-gray-200 hover:bg-gray-300 rounded text-[9px] font-bold text-gray-600">✕</button>}
                                </div>
                                {promoError && <p className="text-[9px] text-red-500 mt-0.5">{promoError}</p>}
                                {promoData && <p className="text-[9px] text-green-600 mt-0.5">✓ {promoData.label}</p>}
                            </div>

                            {/* ── COLONNE 3 : Bouton Panier + détails fichiers ── */}
                            <div className="flex-1 flex flex-col overflow-hidden">
                                {/* Boutons panier */}
                                <div className="px-3 pt-2 pb-1.5 border-b border-gray-100 flex-shrink-0">
                                    {!orderAdded ? (
                                        <div className="flex flex-col gap-1.5">
                                            <button
                                                onClick={handleAddToCart}
                                                disabled={!prix || sheets.length === 0 || isAddingToCart}
                                                className={`w-full h-9 rounded-lg flex items-center justify-center gap-2 font-bold text-sm transition-all shadow ${prix && sheets.length > 0 ? 'bg-green-600 hover:bg-green-700 text-white' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
                                            >
                                                {isAddingToCart
                                                    ? <><span className="animate-spin-slow inline-block">⟳</span> Génération...</>
                                                    : <>🛒 Ajouter au panier {prix ? `— ${formatEur(prix.totalHT)} HT` : ''}</>
                                                }
                                            </button>
                                            {pendingOrders.length > 0 && (
                                                <button
                                                    onClick={handleGoToCart}
                                                    disabled={isAddingToCart}
                                                    className="w-full h-9 rounded-lg flex items-center justify-center gap-1 font-bold text-sm bg-blue-600 hover:bg-blue-700 text-white transition-all shadow disabled:opacity-50"
                                                >
                                                    🛒 Aller au panier ({pendingOrders.length})
                                                </button>
                                            )}
                                        </div>
                                    ) : (
                                        <div className="flex gap-1.5">
                                            <button
                                                onClick={handleAutreMontage}
                                                className="flex-1 h-9 rounded-lg flex items-center justify-center gap-1 font-bold text-sm bg-blue-600 hover:bg-blue-700 text-white transition-all shadow"
                                            >
                                                ➕ Autre montage
                                            </button>
                                            <button
                                                onClick={handleGoToCart}
                                                disabled={isAddingToCart}
                                                className="flex-1 h-9 rounded-lg flex items-center justify-center gap-1 font-bold text-sm bg-green-600 hover:bg-green-700 text-white transition-all shadow disabled:opacity-50"
                                            >
                                                {isAddingToCart ? <><span className="animate-spin-slow inline-block">⟳</span> Envoi...</> : <>🛒 Aller au panier ({pendingOrders.length})</>}
                                            </button>
                                        </div>
                                    )}
                                    {cartMessage && <p className={`text-[10px] mt-1 text-center font-bold ${cartMessage.startsWith('✅') ? 'text-green-600' : 'text-red-500'}`}>{cartMessage}</p>}
                                </div>
                                {/* Détails fichiers */}
                                <div className="flex-1 p-2 overflow-hidden">
                                    <div className="grid grid-cols-3 gap-1.5 overflow-y-auto h-full content-start pr-0.5">
                                        {stats.details.map((item, idx) => (
                                            <div key={idx} className={`bg-white border rounded p-1.5 flex gap-1.5 shadow-sm h-[52px] items-center ${item.made >= item.req ? 'border-green-200' : 'border-gray-200'}`}>
                                                <div className="w-8 h-8 bg-gray-100 border rounded overflow-hidden flex-shrink-0"><img src={item.src} className="w-full h-full object-contain"/></div>
                                                <div className="flex-1 flex flex-col justify-center min-w-0">
                                                    <div className="text-[9px] font-bold truncate text-gray-900" title={item.name}>{item.name}</div>
                                                    <div className="text-[8px] text-gray-600 flex justify-between"><span>{item.req} cmd</span><span className="font-bold">{item.made} fab</span></div>
                                                    <div className="w-full bg-gray-200 rounded-full h-0.5 mt-0.5"><div className={`h-0.5 rounded-full ${item.made >= item.req ? 'bg-green-500' : 'bg-blue-500'}`} style={{ width: `${Math.min(100,(item.made/item.req)*100)}%` }}></div></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div 
                            className="flex-1 bg-gray-200 overflow-hidden relative flex flex-col"
                        >
                            {!hasCalculated && sheets.length === 0 && (<div className="absolute inset-0 flex flex-col items-center justify-center text-gray-500 pointer-events-none px-8">
                                <div className="opacity-20 transform scale-150 mb-4"><Icons.Play /></div>
                                <p className="font-semibold text-sm mb-4">Chargez des fichiers et cliquez sur "Monter"</p>
                                <div className="bg-white/80 rounded-xl shadow-sm border border-gray-200 p-6 max-w-xl text-left text-[13px] leading-relaxed space-y-5">
                                    <div>
                                        <p className="font-bold text-gray-700 text-sm mb-1.5">📐 Réglage de la bordure :</p>
                                        <p className="text-gray-600">La bordure est réglée à <strong>0 par défaut</strong>.<br/>
                                        Si vos dessins n'intègrent pas une bordure autour pour la découpe (mini ~5mm) et que vous faites un montage de plus de 1 transfert, veuillez donner une valeur à la bordure pour permettre la découpe (~5mm mini).</p>
                                    </div>
                                    <div>
                                        <p className="font-bold text-gray-700 text-sm mb-1.5">🔍 Détection des finesses et réserves :</p>
                                        <p className="text-gray-600">Cliquez sur le bouton <strong>"Analyser"</strong> pour voir les dessins "critiques".<br/>
                                        Si un bouton apparaît à côté de la référence d'un transfert, cliquez dessus pour visualiser et faire des corrections des finesses et réserves détectées.</p>
                                    </div>
                                </div>
                            </div>)}
                            
                            {(hasCalculated || sheets.length > 0) && (
                                <div className="w-full flex justify-center border-b border-gray-300 bg-gray-200 pt-2 z-20 flex-shrink-0">
                                    <div className="flex gap-1">
                                        <TabButton id="standard" label="Mode 1" icon={Icons.Grid} />
                                        <TabButton id="compact" label="Mode 2" icon={Icons.Maximize} />
                                        <TabButton id="grouped" label="Mode 3" icon={Icons.Layers} />
                                        <TabButton id="norotate" label="Mode 4" icon={Icons.Ban} />
                                        <TabButton id="manual" label="Manuel" icon={Icons.Hand} />
                                    </div>
                                </div>
                            )}
                            
                            <div className="flex-1 relative w-full overflow-hidden">
                                {errors.length > 0 && ( 
                                    <div className="absolute inset-0 flex flex-col items-center justify-center bg-white/90 z-30 p-4 text-center backdrop-blur-sm"> 
                                        <div className="text-red-500 mb-3"><Icons.AlertTriangle size={48} /></div> 
                                        <h3 className="text-xl font-bold text-gray-800 mb-2">Attention</h3> 
                                        {errors.map((err, i) => <p key={i} className="text-red-600 font-medium mb-1">{err}</p>)} 
                                        <button onClick={() => setErrors([])} className="mt-6 px-6 py-2 bg-gray-200 hover:bg-gray-300 rounded-full text-gray-800 font-bold transition-colors">Fermer</button> 
                                    </div> 
                                )}

                                <div 
                                    ref={viewContainerRef}
                                    className="w-full h-full flex items-center justify-center p-4"
                                >
                                    {sheets.map((sheet, idx) => ( 
                                        <div key={idx} className="flex flex-col items-center justify-center transition-all duration-300 ease-out" style={{ transform: `scale(${scaleFactor})`, transformOrigin: 'center center' }}> 
                                            <div className="relative bg-white shadow-xl flex-shrink-0" style={{ width: `${sheetSize.w}px`, height: `${sheetSize.h}px` }}> 
                                                <div className="w-full h-full relative overflow-hidden border border-gray-300"> 
                                                    {impositionMode === 'massicot' && ( <CutLinesOverlay items={sheet.items} width={sheetSize.w} height={sheetSize.h} /> )} 
                                                    {sheet.items.map((item) => ( 
                                                        <div key={item.uuid} onMouseDown={(e) => handleMouseDown(e, item)} onDoubleClick={(e) => handleDoubleClick(e, item)} className={`absolute flex items-center justify-center overflow-hidden hover:opacity-80 transition-opacity ${activeTab === 'manual' ? 'cursor-grab active:cursor-grabbing' : ''}`} style={{ left: `${item.x}px`, top: `${item.y}px`, width: `${item.w}px`, height: `${item.h}px`, zIndex: 10 }}> 
                                                            <div className="w-full h-full relative flex items-center justify-center"> 
                                                                <div className={`flex items-center justify-center relative ${impositionMode === 'imbrique' ? 'border border-blue-300 border-dashed' : ''}`} style={{ width: `${item.rotated ? item.realH + (margin*2) : item.realW + (margin*2)}px`, height: `${item.rotated ? item.realW + (margin*2) : item.realH + (margin*2)}px` }}> 
                                                                    {impositionMode === 'massicot' && ( <div className="absolute inset-0 border border-red-600 z-0 pointer-events-none"></div> )} 
                                                                    <img 
                                                                        src={item.src} 
                                                                        alt="transfert" 
                                                                        className={`relative z-10 ${impositionMode === 'imbrication' ? '' : 'bg-blue-100'} ${simulatePrint ? 'print-simulated' : ''}`} 
                                                                        style={{ 
                                                                            width: `${item.realW}px`, 
                                                                            height: `${item.realH}px`, 
                                                                            maxWidth: 'none', 
                                                                            maxHeight: 'none', 
                                                                            objectFit: 'fill', 
                                                                            transform: item.rotated ? 'rotate(90deg)' : 'none', 
                                                                            filter: impositionMode === 'imbrication' ? 'url(#outline-effect)' : undefined
                                                                        }} 
                                                                    /> 
                                                                </div> 
                                                            </div> 
                                                        </div> 
                                                    ))} 
                                                </div> 
                                            </div> 
                                            {activeTab === 'manual' && ( <p className="text-[10px] text-gray-500 mt-2 italic font-medium" style={{ transform: `scale(${1/scaleFactor})` }}>Mode Manuel : Double-cliquez sur une forme pour la faire pivoter de 90°.</p> )} 
                                        </div> 
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
